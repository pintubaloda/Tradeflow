version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tradeflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradeflow
      POSTGRES_USER: tradeflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradeflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tradeflow:${DB_PASSWORD:-changeme}@postgres:5432/tradeflow
      JWT_SECRET: ${JWT_SECRET:-change_this_32_char_secret_in_prod}
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
        REACT_APP_WS_URL: ws://localhost:4000/ws
    container_name: tradeflow-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Compose-only: Nginx proxies /api and /ws to this backend service name
      TRADEFLOW_BACKEND_ORIGIN: http://backend:4000
    ports:
      - "3000:80"

volumes:
  pgdata:
