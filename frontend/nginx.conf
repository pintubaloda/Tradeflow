server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Needed when proxying to a hostname (Railway backend URL).
    # Also required if proxy_pass uses a variable, and safe otherwise.
    # 127.0.0.11 is Docker's embedded DNS (required for service names like "backend").
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    # Use a variable so Nginx resolves the upstream at request-time (prevents startup failure
    # when the backend container hasn't started yet).
    set $backend_origin ${TRADEFLOW_BACKEND_ORIGIN};

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # React Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config must never be cached (Railway runtime env)
    location = /runtime-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
        try_files $uri =404;
    }

    # Proxy API to backend (local Docker Compose use-case)
    location /api/ {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy (local Docker Compose use-case)
    location /ws {
        proxy_pass $backend_origin;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
