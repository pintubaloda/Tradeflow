version: '3.9'

# Coolify deployment:
# - No fixed host port mappings (Coolify's reverse-proxy handles public routing)
# - No container_name (lets Coolify manage names)
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradeflow
      POSTGRES_USER: tradeflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tradeflow:${DB_PASSWORD:-changeme}@postgres:5432/tradeflow
      JWT_SECRET: ${JWT_SECRET:-change_this_32_char_secret_in_prod}
      PORT: 4000
      NODE_ENV: production
      # Set this to your public frontend domain in Coolify env (no trailing slash)
      FRONTEND_URL: ${FRONTEND_URL:-https://tradeflow.compucon.in}
      # Safe to keep enabled: schema is applied only if missing.
      AUTO_DB_INIT: ${AUTO_DB_INIT:-true}
      # Demo seed is idempotent (skips if demo tenant exists). Disable after first run if you want.
      DEMO_SEED: ${DEMO_SEED:-true}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-Tradeflow@12345}
      # 2FA (TOTP)
      ENABLE_2FA: ${ENABLE_2FA:-false}
      TWOFA_ENCRYPTION_KEY: ${TWOFA_ENCRYPTION_KEY:-}
      TWOFA_ISSUER: ${TWOFA_ISSUER:-TradeFlow}
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Nginx proxies /api and /ws to this backend service name
      TRADEFLOW_BACKEND_ORIGIN: http://backend:4000
      # Optional: Android app download link (shown on login page)
      TRADEFLOW_ANDROID_APK_URL: ${TRADEFLOW_ANDROID_APK_URL:-https://github.com/pintubaloda/Tradeflow/releases/latest/download/tradeflow.apk}
    expose:
      - "80"
    # If Coolify UI does not expose domain/proxy fields for Compose resources,
    # these Traefik labels make the app reachable via Coolify proxy.
    labels:
      - "traefik.enable=true"
      # IMPORTANT: container is attached to 2 networks (default + coolify).
      # Tell Traefik/Coolify proxy which one to use, otherwise it can pick the wrong one
      # and show "no available server".
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.tradeflow-http.rule=Host(`${FRONTEND_DOMAIN:-tradeflow.compucon.in}`)"
      - "traefik.http.routers.tradeflow-http.entrypoints=web"
      - "traefik.http.routers.tradeflow-http.middlewares=tradeflow-https@docker"
      - "traefik.http.middlewares.tradeflow-https.redirectscheme.scheme=https"
      - "traefik.http.routers.tradeflow.rule=Host(`${FRONTEND_DOMAIN:-tradeflow.compucon.in}`)"
      - "traefik.http.routers.tradeflow.entrypoints=websecure"
      - "traefik.http.routers.tradeflow.tls=true"
      - "traefik.http.services.tradeflow.loadbalancer.server.port=80"
    networks:
      - default
      - coolify

volumes:
  pgdata:

networks:
  coolify:
    external: true
